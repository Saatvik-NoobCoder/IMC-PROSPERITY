<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Premium Gold NY 2026</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  height:100%;
  background:#050505;
  font-family:"Playfair Display","Poppins",serif;
  overflow:hidden;
}

.bg{
  position:fixed;inset:0;
  background:
    radial-gradient(circle at 30% -10%,#cfa24a22,transparent 40%),
    radial-gradient(circle at 80% 110%,#ffd46a22,transparent 40%),
    linear-gradient(135deg,#020202,#0a0a0a,#111);
}

.mist{
  position:fixed;inset:-40%;
  background:conic-gradient(from 0deg,#ffffff08,#ffffff20,#ffffff08);
  animation:spin 25s linear infinite;
  mix-blend:overlay;
}
@keyframes spin{to{transform:rotate(360deg)}}

canvas{position:fixed;inset:0;pointer-events:none}

/* ---------- CENTER TEXT (FIXED VISIBILITY) ---------- */
.wrap{
  position:fixed;
  top:48%;left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

/* MAIN TITLE */
h1{
  font-size:4.3rem;
  letter-spacing:.38em;
  font-weight:700;
  color:#f5d78b;
  text-shadow:
     0 0 10px #f5d78b,
     0 0 25px #b99033,
     0 0 55px #b99033,
     2px 2px 6px #000;
}

/* YEAR */
.year{
  margin-top:1rem;
  font-size:8rem;
  font-weight:900;
  letter-spacing:.12em;
  color:#ffe7a8;
  text-shadow:
     0 0 14px #ffe7a8,
     0 0 45px #d1a847,
     0 0 90px #d1a847,
     3px 3px 10px #000;
}

/* SUB */
.caption{
  margin-top:1.5rem;
  letter-spacing:.25em;
  color:#eee7d8;
  opacity:.8;
  text-shadow:0 0 10px #000;
}

/* FALLING LETTERS */
.letter{
  position:fixed;
  top:-10vh;
  font-size:3.2rem;
  font-weight:900;
  color:#ffe7a8;
  text-shadow:
     0 0 12px #ffe7a8,
     0 0 35px #d1a847,
     2px 2px 8px #000;
  animation:drop 6.5s cubic-bezier(.25,.7,.3,1) forwards;
}
@keyframes drop{
  0%{transform:translateY(-25vh) rotate(-8deg) scale(.9);opacity:0}
  20%{opacity:1}
  55%{transform:translateY(60vh) rotate(8deg) scale(1)}
  100%{transform:translateY(120vh) rotate(18deg);opacity:0}
}

/* FLOATING SPARKS */
.spark{
  position:fixed;
  width:3px;height:3px;
  background:#fff8;
  border-radius:50%;
  animation:rise linear infinite;
}
@keyframes rise{
  from{transform:translateY(110vh)}
  to{transform:translateY(-20vh)}
}

@media(max-width:768px){
  h1{font-size:2.8rem}
  .year{font-size:5.2rem}
}
</style>
</head>

<body>
<div class="bg"></div>
<div class="mist"></div>
<canvas id="fw"></canvas>

<div class="wrap">
  <h1>HAPPY NEW YEAR</h1>
  <div class="year">2026</div>
  <div class="caption">A YEAR OF GOLDEN MOMENTS ✨</div>
</div>

<script>
// sparks
for(let i=0;i<70;i++){
  const s=document.createElement("div");
  s.className="spark";
  s.style.left=Math.random()*100+"vw";
  s.style.animationDuration=(7+Math.random()*8)+"s";
  s.style.animationDelay=Math.random()*-10+"s";
  document.body.appendChild(s);
}

// falling letters
const msg="HAPPY NEW YEAR 2026";
let p=0;
setInterval(()=>{
  const ch=msg[p%msg.length];
  if(ch!==" "){
    const el=document.createElement("div");
    el.className="letter";
    el.textContent=ch;
    el.style.left=(10+Math.random()*80)+"vw";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),7000);
  }
  p++;
},220);

// fireworks
const c=document.querySelector("canvas"),ctx=c.getContext("2d");
function size(){c.width=innerWidth;c.height=innerHeight}
size();addEventListener("resize",size);

class P{
  constructor(x,y,col){
    this.x=x;this.y=y;this.c=col;
    const a=Math.random()*Math.PI*2,s=2+Math.random()*4.5;
    this.vx=Math.cos(a)*s;this.vy=Math.sin(a)*s;
    this.a=1;this.d=0.01+Math.random()*0.02;
  }
  u(){this.x+=this.vx;this.y+=this.vy;this.vy+=0.03;this.a-=this.d}
  d(){ctx.globalAlpha=this.a;ctx.fillStyle=this.c;
    ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill();}
}
let arr=[];
setInterval(()=>{
  const x=Math.random()*c.width*0.7+c.width*0.15;
  const y=Math.random()*c.height*0.4+c.height*0.1;
  const col=["#ffe7a8","#f6d98b","#d1a847","#ffffff"][Math.floor(Math.random()*4)];
  for(let i=0;i<90;i++)arr.push(new P(x,y,col));
},1400);

(function loop(){
  ctx.fillStyle="rgba(0,0,0,.28)";
  ctx.fillRect(0,0,c.width,c.height);
  arr=arr.filter(p=>p.a>0);
  arr.forEach(p=>{p.u();p.d();});
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
