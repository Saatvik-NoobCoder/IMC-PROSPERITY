<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Recommendation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🍎 Food Recommendation</h1>

        <div class="card">
            <h2>Enter Your Details</h2>
            <input id="present" placeholder="Present Disease">
            <input id="past" placeholder="Past Disease">
            <input id="med" placeholder="Current Medications">
            <input id="allergy" placeholder="Allergies">
            <button onclick="getPrediction()">Check Food</button>
            <div id="output"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
