<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Liquid Glass Onboarding</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  body {
    margin:0;
    font-family:"Inter",sans-serif;
    color:#f1f5f9;
    background:linear-gradient(-45deg,#0a0f1f,#1a2235,#0b3c5d,#5b21b6);
    background-size:400% 400%;
    animation:gradientShift 20s ease infinite;
    overflow:hidden;
  }
  @keyframes gradientShift {
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
  }

  .wrap{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px;
  }
  .card{
    backdrop-filter:blur(20px) saturate(160%);
    -webkit-backdrop-filter:blur(20px) saturate(160%);
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.18);
    border-radius:20px;
    padding:32px;
    width:100%;
    max-width:600px;
    box-shadow:0 20px 40px rgba(0,0,0,0.35);
    position:relative;
    overflow:hidden;
    animation:floatCard 6s ease-in-out infinite;
  }
  @keyframes floatCard {
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-6px);}
  }

  .slide{
    opacity:0;
    transform:translateX(40px);
    transition:all .7s cubic-bezier(.4,.1,.2,1);
    position:absolute;
    top:0;left:0;width:100%;height:100%;
    padding:32px;
    pointer-events:none;

    display:flex;
    flex-direction: column;
    align-items: center; /* center inputs horizontally */
  }
  .slide.active{
    opacity:1;
    transform:translateX(0);
    pointer-events:auto;
    position:relative;
  }

  h2{margin-top:0;font-size:1.6rem;font-weight:700;text-align:center}
  label{
    display:block;
    margin:14px 0 6px;
    font-size:14px;
    color:rgba(255,255,255,0.85);
    text-shadow:0 1px 2px rgba(0,0,0,0.6);
  }

  input,select{
    width:100%;
    max-width:400px; /* limit width for center alignment */
    padding:12px 14px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.15);
    background:rgba(255,255,255,0.06);
    color:#fff;
    font-size:15px;
    transition:all .3s;
    margin:6px 0;
    box-sizing: border-box;
  }
  input::placeholder {
    color:rgba(255,255,255,0.7);
    text-shadow:0 1px 2px rgba(0,0,0,0.4);
  }
  input:focus,select:focus{
    outline:none;
    border-color:#60a5fa;
    box-shadow:0 0 12px rgba(96,165,250,0.6);
    transform:scale(1.02);
  }

  .navBtns{
    display:flex;
    justify-content:space-between;
    margin-top:24px;
    width:100%;
    max-width:400px; /* align buttons with inputs */
  }
  button{
    background:linear-gradient(135deg,#3b82f6,#9333ea);
    border:none;
    padding:12px 20px;
    border-radius:12px;
    color:#fff;
    font-weight:600;
    cursor:pointer;
    transition:all .25s ease;
    width:48%;
  }
  button:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(147,51,234,0.4);}
  button:active{transform:translateY(1px);}
  button:disabled{opacity:0.5;cursor:not-allowed;box-shadow:none;transform:none;}

  .result {
    margin-top:18px;
    padding:18px;
    border-radius:14px;
    font-size:15px;
    line-height:1.4;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    opacity:0;
    transform:translateY(10px);
    transition:all 0.5s ease;
    max-width:400px;
    width:100%;
  }
  .result.show {
    opacity:1;
    transform:translateY(0);
  }
  .verdict {
    display:inline-block;
    padding:8px 14px;
    border-radius:999px;
    font-weight:700;
    margin-bottom:10px;
    letter-spacing:0.3px;
  }
  .verdict.good {
    background:rgba(72,255,182,0.15);
    border:1px solid rgba(72,255,182,0.4);
    color:#48ffb6;
    box-shadow:0 0 12px rgba(72,255,182,0.3);
  }
  .verdict.bad {
    background:rgba(255,107,107,0.12);
    border:1px solid rgba(255,107,107,0.4);
    color:#ff6b6b;
    box-shadow:0 0 12px rgba(255,107,107,0.3);
  }
  footer{margin-top:20px;font-size:13px;color:rgba(255,255,255,0.6);text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <!-- Slide 1 -->
    <div class="slide active" id="slide1">
      <h2>Step 1: Personal Info</h2>
      <label>Name</label>
      <input type="text" id="name" placeholder="Enter your name"/>
      <label>Age</label>
      <input type="number" id="age" placeholder="Enter your age"/>
      <label>Gender</label>
      <select id="gender">
        <option value="">Select</option>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
      </select>
      <div class="navBtns">
        <div></div>
        <button onclick="nextSlide(2)">Next ➝</button>
      </div>
    </div>

    <!-- Slide 2 -->
    <div class="slide" id="slide2">
      <h2>Step 2: Health Input</h2>
      <label>Medical Condition</label>
      <input type="text" id="condition" placeholder="e.g. diabetes"/>
      <label>Food Item</label>
      <input type="text" id="food" placeholder="e.g. beans"/>

      <div style="margin-top:16px; width:100%; max-width:400px; display:flex; justify-content:center;">
        <button onclick="runCheck()" style="width:100%;">Check Food ➝</button>
      </div>

      <!-- Verdict result -->
      <div id="result" class="result"></div>

      <div class="navBtns">
        <button onclick="nextSlide(1)">⬅ Back</button>
        <button id="nextBtn2" onclick="nextSlide(3)" disabled>Next ➝</button>
      </div>
    </div>

    <!-- Slide 3 -->
    <div class="slide" id="slide3">
      <h2>Step 3: Contact Info</h2>
      <label>Email</label>
      <input type="email" id="email" placeholder="Enter your email"/>
      <label>Contact Number</label>
      <input type="tel" id="contact" placeholder="Enter your phone"/>
      <div class="navBtns">
        <button onclick="nextSlide(2)">⬅ Back</button>
        <button onclick="finish()">Finish ✔</button>
      </div>
    </div>
  </div>
</div>
<footer>⚠️ Informational only. Not medical advice.</footer>

<script>
// Demo KB (replace with ML model)
const KB = {
  diabetes: {
    beans: {verdict:"good", reason:"Beans are low GI and improve glycemic control.", biomarker:"HbA1c, fasting glucose"},
    "white bread": {verdict:"bad", reason:"Refined bread spikes blood sugar rapidly.", biomarker:"Postprandial glucose"}
  },
  hypertension: {
    salt: {verdict:"bad", reason:"High sodium raises blood pressure.", biomarker:"Systolic BP"}
  }
};

function nextSlide(num){
  document.querySelectorAll('.slide').forEach(s=>s.classList.remove('active'));
  document.getElementById('slide'+num).classList.add('active');
}

function runCheck(){
  const condition = document.getElementById("condition").value.trim().toLowerCase();
  const food = document.getElementById("food").value.trim().toLowerCase();
  const result = document.getElementById("result");
  const nextBtn2 = document.getElementById("nextBtn2");
  result.classList.remove("show");
  nextBtn2.disabled = true;

  setTimeout(()=>{
    let verdictData = KB[condition]?.[food];
    if(!verdictData){
      result.innerHTML = `<div>No data for <b>${food}</b> and <b>${condition}</b>.</div>`;
    } else {
      result.innerHTML = `
        <div class="verdict ${verdictData.verdict}">${verdictData.verdict.toUpperCase()}</div>
        <div><b>${food}</b> for <i>${condition}</i></div>
        <p>${verdictData.reason}</p>
        <p><strong>Biomarker:</strong> ${verdictData.biomarker}</p>`;
    }
    result.classList.add("show");
    nextBtn2.disabled = false;
  },200);
}

function finish(){
  alert("🎉 Thanks! Data captured.\n\nNow you can send it to your ML model or backend.");
}
</script>
</body>
</html>
